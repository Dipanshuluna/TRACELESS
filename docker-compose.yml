version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      VW_FRONTEND_ORIGIN: http://localhost:5173
      VW_ATTACHED_CONTAINER_NAME: firefox-container
      VW_BROWSER_URL: http://localhost:3000
      VW_DOWNLOAD_DIR: /config/downloads
      VW_END_SESSION_STOPS_CONTAINER: "false"
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
