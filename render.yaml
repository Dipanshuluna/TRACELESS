services:
  # Backend API Service
  - type: web
    name: traceless-backend
    runtime: python3
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn --bind 0.0.0.0:$PORT app.factory:create_app()"
    envVars:
      - key: VW_FRONTEND_ORIGIN
        value: https://traceless-frontend.onrender.com
      - key: VW_ATTACHED_CONTAINER_NAME
        value: firefox-container
      - key: VW_BROWSER_URL
        value: https://firefox-container.onrender.com
      - key: VW_DOWNLOAD_DIR
        value: /tmp/downloads
      - key: VW_MAX_SESSION_MINUTES
        value: 30
      - key: VW_END_SESSION_STOPS_CONTAINER
        value: "true"
      - key: VW_RESET_PATHS
        value: /tmp/downloads
      - key: VW_DISABLE_DOCKER
        value: "true"
    plan: starter

  # Frontend Service
  - type: web
    name: traceless-frontend
    runtime: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npx serve -s dist -l $PORT"
    envVars:
      - key: VITE_API_BASE_URL
        value: https://traceless-backend.onrender.com/api
    plan: starter

  # Firefox Container Service (Standalone web service)
  - type: web
    name: firefox-container
    runtime: docker
    dockerfilePath: ./browser-container/Dockerfile
    dockerContext: ./browser-container
    envVars:
      - key: WEB_AUDIO
        value: "1"
    ports:
      - type: web
        port: 3000
    plan: starter

# Environment variables that apply to all services
envVars:
  - key: NODE_ENV
    value: production
